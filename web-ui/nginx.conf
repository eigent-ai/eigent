# Container-internal static file server for the web-ui image.
#
# Scope: SPA fallback + long-cache for hashed assets. Nothing else.
# Security headers (CSP / HSTS / Referrer-Policy / X-Forwarded-* trust) and TLS
# termination belong to the reverse proxy in front of this container (Dokploy /
# Traefik / etc), not here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Vite outputs hashed filenames under /assets/, so they are safe to cache
    # forever. Cache-Control here is a browser optimization, not a security
    # control.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Public remote-control link SPA. The exact /remote-control path renders
    # the lean entry too, so malformed public links get the invalid-link state
    # instead of the full authenticated web app.
    location = /remote-control {
        try_files $uri /remote.html;
    }

    # Anything under /remote-control/* that is not a real file falls back to
    # the public remote.html entry.
    location /remote-control/ {
        try_files $uri /remote.html;
    }

    # Full web-app SPA: /login, /projects, /profile, ... all fall back to
    # index.html so the React router can render them.
    location / {
        try_files $uri /index.html;
    }
}
